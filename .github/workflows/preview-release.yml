name: Preview Release
run-name: Preview release ${{ inputs.tag }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Preview tag, for example v0.1.0-preview.2
        required: true
        type: string

concurrency:
  group: preview-release-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare GitHub prerelease
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
    steps:
      - name: Validate preview tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-preview\.[0-9]+$ ]]; then
            echo "::error::Tag must look like v0.1.0-preview.2"
            exit 1
          fi

      - name: Create or find prerelease
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag }}
          COMMIT: ${{ github.sha }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            prerelease=$(gh api "repos/$GH_REPO/releases/tags/$TAG" --jq .prerelease)
            if [[ "$prerelease" != "true" ]]; then
              echo "::error::$TAG already exists but is not marked as a prerelease"
              exit 1
            fi
          else
            gh release create "$TAG" \
              --target "$COMMIT" \
              --prerelease \
              --title "OKF Editor ${TAG#v}" \
              --notes "Unsigned preview build for early testing. macOS Gatekeeper and Windows SmartScreen may require users to explicitly allow installation."
          fi

          release_id=$(gh api "repos/$GH_REPO/releases/tags/$TAG" --jq .id)
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            platform: macos-latest
            args: --target aarch64-apple-darwin --bundles dmg
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          - label: macOS Intel
            platform: macos-latest
            args: --target x86_64-apple-darwin --bundles dmg
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          - label: Windows
            platform: windows-latest
            args: --bundles nsis,msi
            rust_targets: ""
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload unsigned installers
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          releaseId: ${{ needs.prepare.outputs.release_id }}
          tagName: ${{ inputs.tag }}
          uploadUpdaterJson: false
          args: ${{ matrix.args }}
